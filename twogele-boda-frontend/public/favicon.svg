<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Twogele Boda">
  <rect width="64" height="64" rx="14" fill="#f59e0b"/>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#fcf9f2"/>
  <!-- wheels -->
  <circle cx="20" cy="44" r="8" fill="none" stroke="#855300" stroke-width="3"/>
  <circle cx="20" cy="44" r="2.5" fill="#855300"/>
  <circle cx="46" cy="44" r="8" fill="none" stroke="#855300" stroke-width="3"/>
  <circle cx="46" cy="44" r="2.5" fill="#855300"/>
  <!-- body / frame -->
  <path
    d="M20 44 L28 28 H40 L46 44 M28 28 L34 18 H42"
    fill="none"
    stroke="#855300"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- seat -->
  <path d="M26 28 H36" stroke="#613b00" stroke-width="4" stroke-linecap="round"/>
  <!-- headlight -->
  <circle cx="42" cy="18" r="3" fill="#f59e0b" stroke="#855300" stroke-width="1.5"/>
  <!-- T mark -->
  <text
    x="32"
    y="14"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="9"
    font-weight="800"
    fill="#855300"
  >TB</text>
</svg>
